name: Bug report
description: Report a problem with SignalForge, docs, releases, or operator setup
title: "[Bug]: "
labels: [bug]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce it?
      placeholder: "1. ...\n2. ...\n3. ..."
  - type: input
    id: environment
    attributes:
      label: Environment
      description: Browser, OS, Docker, recorder version, or deployment details if relevant
  - type: textarea
    id: notes
    attributes:
      label: Notes
      description: Add logs or screenshots with secrets removed.
