name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  repository_dispatch:
    types: [new-release]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Do not cancel in-progress Pages deploys — cancelling mid-flight causes
# "Deployment failed, try again later" from the Pages API.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/configure-pages@v6

      - uses: actions/upload-pages-artifact@v5
        with:
          path: .

      - id: deployment
        uses: actions/deploy-pages@v5
